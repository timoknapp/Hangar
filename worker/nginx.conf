server {
    listen 8080;
    server_name _;

    # Serve toolbar.js as static file — no caching so deploys take effect immediately
    location ~ ^/toolbar\.js {
        root /var/www/html;
        rewrite ^/toolbar\.js$ /toolbar.js break;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Proxy everything else to ttyd
    location / {
        proxy_pass http://127.0.0.1:7681;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # Inject toolbar script in <head> so WebSocket hook runs before ttyd
        proxy_set_header Accept-Encoding "";
        sub_filter '</head>' '<script src="/toolbar.js?v=10"></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
