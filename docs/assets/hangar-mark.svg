<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Hangar mark">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wing-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fuselage-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e6edf3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#adbac7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#sky)" stroke="#30363d" stroke-width="1.5"/>

  <!-- Hangar arch -->
  <path d="M18 82 Q18 44 60 40 Q102 44 102 82" fill="none" stroke="#30363d" stroke-width="2.5"/>
  <line x1="18" y1="82" x2="18" y2="92" stroke="#30363d" stroke-width="2.5"/>
  <line x1="102" y1="82" x2="102" y2="92" stroke="#30363d" stroke-width="2.5"/>
  <line x1="15" y1="92" x2="105" y2="92" stroke="#30363d" stroke-width="2.5"/>

  <!-- Hangar door lines -->
  <line x1="60" y1="40" x2="60" y2="92" stroke="#21262d" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Runway / ground line -->
  <line x1="15" y1="92" x2="105" y2="92" stroke="#3d444d" stroke-width="1"/>
  <!-- Runway centerline dashes -->
  <line x1="33" y1="96" x2="43" y2="96" stroke="#3d444d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="96" x2="65" y2="96" stroke="#3d444d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="77" y1="96" x2="87" y2="96" stroke="#3d444d" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Plane — top-down silhouette, taxiing out -->
  <!-- Fuselage -->
  <ellipse cx="60" cy="70" rx="4.5" ry="13" fill="url(#fuselage-grad)" filter="url(#glow)"/>
  <!-- Left wing -->
  <path d="M55.5 67 L30 74 L32 76 L55.5 71" fill="url(#wing-grad)" opacity="0.92"/>
  <!-- Right wing -->
  <path d="M64.5 67 L90 74 L88 76 L64.5 71" fill="url(#wing-grad)" opacity="0.92"/>
  <!-- Tail left -->
  <path d="M57 81 L46 88 L47.5 89.5 L58 83.5" fill="url(#wing-grad)" opacity="0.7"/>
  <!-- Tail right -->
  <path d="M63 81 L74 88 L72.5 89.5 L62 83.5" fill="url(#wing-grad)" opacity="0.7"/>
  <!-- Nose highlight -->
  <ellipse cx="60" cy="58" rx="2" ry="2.5" fill="#e6edf3" opacity="0.7"/>

  <!-- Terminal blink cursor — top left of badge, thematic touch -->
  <rect x="22" y="22" width="6" height="1.5" rx="0.5" fill="#58a6ff" opacity="0.6"/>
  <rect x="22" y="25" width="10" height="1.5" rx="0.5" fill="#3d444d" opacity="0.5"/>
  <rect x="22" y="28" width="8" height="1.5" rx="0.5" fill="#3d444d" opacity="0.5"/>
  <rect x="22" y="31" width="4" height="1.5" rx="0.5" fill="#58a6ff" opacity="0.8"/>

  <!-- Outer ring accent -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="#1f6feb" stroke-width="0.5" opacity="0.4"/>
</svg>
