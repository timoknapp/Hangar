# =============================================================================
# docker-compose.yml — Trusted interactive service for the unified Hangar stack
#
# Usage:
#   cp .env.workers.example .env.workers
#   cp repos.example.json repos.json
#   ./deploy.sh up
#   ssh -p 2222 copilot@localhost
# =============================================================================

name: hangar-fleet

services:
  hangar:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CACHE_BUST: ${CACHE_BUST:-0}
    container_name: hangar
    hostname: hangar
    init: true
    restart: unless-stopped
    environment:
      - REPO_URL=${INTERACTIVE_REPO_URL:-}
      - REPO_BRANCH=${INTERACTIVE_REPO_BRANCH:-main}
      - WORKSPACE_DIR=/workspace/${INTERACTIVE_WORKSPACE_NAME:-repo}
      - EXTRA_REPOS=${INTERACTIVE_EXTRA_REPOS:-}
      - TTYD_PORT=7681
      - ENABLE_TTYD=${INTERACTIVE_ENABLE_TTYD:-false}
      - AUTO_UPDATE_CLI=${INTERACTIVE_AUTO_UPDATE_CLI:-false}
    ports:
      - "${INTERACTIVE_TTYD_BIND_ADDRESS:-127.0.0.1}:${INTERACTIVE_TTYD_PORT:-7681}:8080"
      - "${INTERACTIVE_SSH_BIND_ADDRESS:-127.0.0.1}:${INTERACTIVE_SSH_PORT:-2222}:22"
      - "${INTERACTIVE_PREVIEW_BIND_ADDRESS:-127.0.0.1}:${INTERACTIVE_PREVIEW_PORT:-4173}:4173"
    volumes:
      - hangar-gh-auth:/home/copilot/.config/gh
      - hangar-ssh:/home/copilot/.ssh
      - hangar-workspace:/workspace
      - hangar-copilot-data:/home/copilot/.local/share
      - hangar-sshd:/etc/ssh

volumes:
  hangar-gh-auth:
    name: "${INTERACTIVE_VOLUME_PREFIX:-hangar}_hangar-gh-auth"
  hangar-ssh:
    name: "${INTERACTIVE_VOLUME_PREFIX:-hangar}_hangar-ssh"
  hangar-workspace:
    name: "${INTERACTIVE_VOLUME_PREFIX:-hangar}_hangar-workspace"
  hangar-copilot-data:
    name: "${INTERACTIVE_VOLUME_PREFIX:-hangar}_hangar-copilot-data"
  hangar-sshd:
    name: "${INTERACTIVE_VOLUME_PREFIX:-hangar}_hangar-sshd"
